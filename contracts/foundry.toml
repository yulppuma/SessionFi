[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/"
]

solc_version = "0.8.20"

[profile.default.optimizer]
enabled = true
runs = 200

[profile.test]
optimize = false

[profile.production]
optimize = true
optimizer_runs = 999

[fmt]
line_length = 120
tab_width = 4
use_tabs = false
