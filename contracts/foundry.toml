[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/"
]

solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200

[profile.test]
optimizer = false

[profile.production]
optimizer = true
optimizer_runs = 999

[fmt]
line_length = 120
tab_width = 4
use_tabs = false